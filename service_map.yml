  flagd:
    protocol: http
    port: 8013
    language: n/a
    depends_on: []
    metrics: []
    observable_via:
      metrics:
        - cart          # feature_flag_evaluation_* metrics on cart reflect flagd flag evaluations
        - recommendation  # flagd.evaluation.v1.Service/ResolveBoolean client spans on recommendation
        - productreviews  # flagd.evaluation.v1.Service/EventStream client spans on product-reviews
        - payment       # charge.js uses @openfeature/flagd-provider for paymentFailure flag
        - checkout      # main.go initializes FlagdProvider for checkout feature flags
    logs: null
    traces:
      jaeger_service: flagd
      server_operations: []
      client_operations: []
      error_tag: error
      lookback_default_minutes: 30

  valkey-cart:
    protocol: http
    port: 6379
    language: n/a
    depends_on: []
    metrics: []  # not instrumented with OTel; no Prometheus series under service_name="valkey-cart"
    observable_via:
      metrics:
        - cart  # app_cart_add_item_latency_seconds + app_cart_get_cart_latency_seconds
                # reflect valkey round-trip latency from cart's perspective

  astronomy-db:
    protocol: http
    port: 5432
    language: n/a
    depends_on: []
    metrics: []  # not instrumented with OTel; no Prometheus series under service_name="astronomy-db"
    observable_via:
      metrics:
        - productcatalog  # db_client_operation_duration_seconds{service_name="product-catalog"}
