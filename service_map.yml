# Service map for the OpenTelemetry demo stack.
# Swap this file (or set SERVICE_MAP_PATH env var) to adapt to another system.
#
# Topology fields:
#   protocol: http | grpc
#   port: primary port
#   language: runtime language
#   depends_on: list of upstream services this service calls
#
# Observability capabilities (scanned from live Prometheus — regenerate with scripts/scan_capabilities.py):
#   metrics: list of metric families available in Prometheus for this service
#     name:         metric base name (histogram families listed without _bucket/_count/_sum suffix)
#     type:         histogram | counter | gauge
#     category:     golden_signal | custom | runtime | system | meta
#                   golden_signal = latency/error rate, use first for RCA
#                   custom = app-specific business metrics
#                   runtime = language runtime internals (GC, threads, memory)
#                   system = OS-level (CPU, disk, network)
#                   meta = OTel SDK internals, target_info
#     label_keys:   all label dimensions present on this metric (excluding internal labels:
#                   instance, host_name, job, service_instance_id, service_namespace,
#                   service_version, service_criticality)
#     label_values: distinct observed values for dimensions useful for filtering
#                   (omitted for high-cardinality dims like server_address, le)
#
#   observable_via: for infra services with no direct Prometheus instrumentation,
#     the app services whose client-side metrics expose this dependency's health

services:

  frontend:
    protocol: http
    port: 8080
    language: typescript
    depends_on:
      - checkout
      - cart
      - productcatalog
      - recommendation
      - currency
      - shipping
      - flagd
    metrics:
      # NOTE: frontend uses legacy OTel HTTP semantic conventions (milliseconds suffix,
      # http_status_code label instead of http_response_status_code)
      - name: http_server_duration_milliseconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [frontend]
          http_method: [GET, POST]
          http_status_code: ["200", "308", "500"]
          http_flavor: ["1.1"]
          http_scheme: [http]
          net_host_name: [frontend-proxy, localhost]
          net_host_port: ["8080"]
          le: []  # histogram bucket boundary

      - name: http_client_duration_milliseconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [frontend]
          http_method: [GET]
          net_peer_name: []  # high-cardinality
          le: []  # histogram bucket boundary

      - name: app_frontend_requests_total
        type: counter
        category: custom
        labels:
          service_name: [frontend]
          method: [GET, POST]
          status: ["200", "500"]
          target: []  # high-cardinality (per-product URLs)

      - name: traces_span_metrics_duration_milliseconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [frontend]
          span_kind: [SPAN_KIND_CLIENT, SPAN_KIND_INTERNAL, SPAN_KIND_SERVER]
          span_name:
            - "GET /"
            - "GET /_error"
            - "GET /api/cart"
            - "GET /api/data"
            - "GET /api/products/[productId]/index"
            - "GET /api/recommendations"
            - "POST /_error"
            - "POST /api/cart"
            - "POST /api/checkout"
            - dns.lookup
            - "executing api route (pages) /api/cart"
            - "executing api route (pages) /api/checkout"
            - "executing api route (pages) /api/data"
            - "executing api route (pages) /api/products/[productId]/index"
            - "executing api route (pages) /api/recommendations"
            - "oteldemo.AdService/GetAds"
            - "oteldemo.CartService/AddItem"
            - "oteldemo.CartService/GetCart"
            - "oteldemo.CheckoutService/PlaceOrder"
            - "oteldemo.ProductCatalogService/GetProduct"
            - "oteldemo.RecommendationService/ListRecommendations"
            - "render route (pages) /"
            - "render route (pages) /_error"
            - resolve page components
            - tcp.connect
          status_code: [STATUS_CODE_ERROR, STATUS_CODE_UNSET]
          le: []  # histogram bucket boundary

      - name: traces_span_metrics_calls_total
        type: counter
        category: golden_signal
        labels:
          service_name: [frontend]
          span_kind: [SPAN_KIND_CLIENT, SPAN_KIND_INTERNAL, SPAN_KIND_SERVER]
          span_name:
            - "GET /"
            - "GET /_error"
            - "GET /api/cart"
            - "GET /api/data"
            - "GET /api/products/[productId]/index"
            - "GET /api/recommendations"
            - "POST /_error"
            - "POST /api/cart"
            - "POST /api/checkout"
            - dns.lookup
            - "executing api route (pages) /api/cart"
            - "executing api route (pages) /api/checkout"
            - "executing api route (pages) /api/data"
            - "executing api route (pages) /api/products/[productId]/index"
            - "executing api route (pages) /api/recommendations"
            - "oteldemo.AdService/GetAds"
            - "oteldemo.CartService/AddItem"
            - "oteldemo.CartService/GetCart"
            - "oteldemo.CheckoutService/PlaceOrder"
            - "oteldemo.ProductCatalogService/GetProduct"
            - "oteldemo.RecommendationService/ListRecommendations"
            - "render route (pages) /"
            - "render route (pages) /_error"
            - resolve page components
            - tcp.connect
          status_code: [STATUS_CODE_ERROR, STATUS_CODE_UNSET]

      - name: nodejs_eventloop_delay_max_seconds
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: nodejs_eventloop_delay_mean_seconds
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: nodejs_eventloop_delay_min_seconds
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: nodejs_eventloop_delay_p50_seconds
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: nodejs_eventloop_delay_p90_seconds
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: nodejs_eventloop_delay_p99_seconds
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: nodejs_eventloop_delay_stddev_seconds
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: nodejs_eventloop_time_seconds_total
        type: counter
        category: runtime
        labels:
          service_name: [frontend]
          nodejs_eventloop_state: [active, idle]

      - name: nodejs_eventloop_utilization_ratio
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]

      - name: v8js_gc_duration_seconds
        type: histogram
        category: runtime
        labels:
          service_name: [frontend]
          v8js_gc_type: [incremental, major, minor]
          le: []  # histogram bucket boundary

      - name: v8js_memory_heap_limit_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]
          v8js_heap_space_name:
            - code_large_object_space
            - code_space
            - large_object_space
            - new_large_object_space
            - new_space
            - old_space
            - read_only_space
            - shared_large_object_space
            - shared_space
            - trusted_large_object_space
            - trusted_space

      - name: v8js_memory_heap_space_available_size_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]
          v8js_heap_space_name:
            - code_large_object_space
            - code_space
            - large_object_space
            - new_large_object_space
            - new_space
            - old_space
            - read_only_space
            - shared_large_object_space
            - shared_space
            - trusted_large_object_space
            - trusted_space

      - name: v8js_memory_heap_space_physical_size_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]
          v8js_heap_space_name:
            - code_large_object_space
            - code_space
            - large_object_space
            - new_large_object_space
            - new_space
            - old_space
            - read_only_space
            - shared_large_object_space
            - shared_space
            - trusted_large_object_space
            - trusted_space

      - name: v8js_memory_heap_used_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [frontend]
          v8js_heap_space_name:
            - code_large_object_space
            - code_space
            - large_object_space
            - new_large_object_space
            - new_space
            - old_space
            - read_only_space
            - shared_large_object_space
            - shared_space
            - trusted_large_object_space
            - trusted_space

      - name: target_info
        type: gauge
        category: meta
        labels:
          service_name: [frontend]
          telemetry_sdk_language: [nodejs]
          telemetry_sdk_name: [opentelemetry]
          process_runtime_name: [nodejs]

    logs:
      # Frontend Go app does NOT emit structured logs to OpenSearch.
      # Source: Envoy sidecar proxy (resource.service.name="frontend-proxy",
      #         resource.log_name="otel_envoy_access_log"). No OTel severity.
      source: opensearch
      index_pattern: "otel-logs-*"
      service_name_field: "resource.log_name.keyword"
      service_name_value: "otel_envoy_access_log"  # resource.service.name="frontend-proxy"
      timestamp_field: "@timestamp"
      severity_field: null  # no OTel severity on envoy access logs
      body_field: body
      # Envoy access log body format (space-delimited):
      # [timestamp] "METHOD path HTTP/version" STATUS bytes_recv bytes_sent duration_ms upstream_duration_ms ...
      # Example: [2026-04-12T23:13:10.245Z] "POST /api/checkout HTTP/1.1" 500 - via_upstream - "-" 388 21 111 109 ...
      body_parse:
        method: 'regex:^\\[.*?\\] "([A-Z]+) '         # e.g. GET, POST
        path: 'regex:^\\[.*?\\] "[A-Z]+ ([^ ]+) '     # e.g. /api/checkout
        status_code: 'regex:" ([0-9]{3}) '             # e.g. 500
        duration_ms: 'regex:" [0-9]{3} [^ ]+ [^ ]+ [^ ]+ [^ ]+ [^ ]+ [0-9]+ [0-9]+ ([0-9]+) '  # field 9 (0-indexed)
      error_filter:
        field: body
        regex: '" [45][0-9]{2} '  # matches 4xx/5xx status codes embedded in body string
      trace_id_field: traceId
      span_id_field: spanId
      key_attribute_fields:
        - attributes.url.path           # e.g. /api/products/6E92ZMYYFZ, /api/cart, /api/checkout
        - attributes.url.full           # full URL including host
        - attributes.url.query          # query string ("-" if absent)
        - attributes.upstream.cluster   # envoy upstream cluster name (e.g. "frontend")
        - attributes.upstream.host      # upstream IP:port
        - attributes.server.address     # frontend-proxy:8080
        - attributes.source.address     # client IP
        - attributes.destination.address
        - attributes.user_agent.original
        - attributes.event.name         # "proxy.access"

    traces:
      jaeger_service: frontend
      server_operations:
        - "GET /"
        - "GET /_error"
        - "GET /api/cart"
        - "GET /api/data"
        - "GET /api/products/[productId]/index"
        - "GET /api/recommendations"
        - "POST /_error"
        - "POST /api/cart"
        - "POST /api/checkout"
      client_operations:
        - oteldemo.CartService/AddItem
        - oteldemo.CartService/GetCart
        - oteldemo.CheckoutService/PlaceOrder
        - oteldemo.ProductCatalogService/GetProduct
        - oteldemo.RecommendationService/ListRecommendations
      error_tag: error
      lookback_default_minutes: 30

  checkout:
    protocol: grpc
    port: 5050
    language: go
    depends_on:
      - cart
      - productcatalog
      - currency
      - shipping
      - payment
      - email
      - flagd
    metrics:
      - name: rpc_server_call_duration_seconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [checkout]
          rpc_method: ["oteldemo.CheckoutService/PlaceOrder"]
          rpc_response_status_code: [INTERNAL, OK]
          rpc_system_name: [grpc]
          le: []  # histogram bucket boundary

      - name: rpc_client_call_duration_seconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [checkout]
          rpc_method:
            - "oteldemo.CartService/EmptyCart"
            - "oteldemo.CartService/GetCart"
            - "oteldemo.CurrencyService/Convert"
            - "oteldemo.PaymentService/Charge"
            - "oteldemo.ProductCatalogService/GetProduct"
          rpc_response_status_code: [OK, UNAVAILABLE]
          rpc_system_name: [grpc]
          server_address: []  # high-cardinality
          server_port: []  # high-cardinality
          le: []  # histogram bucket boundary

      - name: http_client_request_duration_seconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [checkout]
          http_request_method: [POST]
          http_response_status_code: ["200", "400"]
          network_protocol_name: [http]
          network_protocol_version: ["1.1"]
          server_address: []  # high-cardinality
          server_port: []  # high-cardinality
          url_scheme: [http]
          le: []  # histogram bucket boundary

      - name: http_client_request_body_size_bytes
        type: histogram
        category: custom
        labels:
          service_name: [checkout]
          http_request_method: [POST]
          http_response_status_code: ["200", "400"]
          network_protocol_name: [http]
          network_protocol_version: ["1.1"]
          server_address: []  # high-cardinality
          server_port: []  # high-cardinality
          url_scheme: [http]
          le: []  # histogram bucket boundary

      - name: traces_span_metrics_duration_milliseconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [checkout]
          span_kind: [SPAN_KIND_CLIENT, SPAN_KIND_INTERNAL, SPAN_KIND_SERVER]
          span_name:
            - POST
            - "oteldemo.CartService/EmptyCart"
            - "oteldemo.CartService/GetCart"
            - "oteldemo.CheckoutService/PlaceOrder"
            - "oteldemo.CurrencyService/Convert"
            - "oteldemo.PaymentService/Charge"
            - "oteldemo.ProductCatalogService/GetProduct"
            - prepareOrderItemsAndShippingQuoteFromCart
          status_code: [STATUS_CODE_ERROR, STATUS_CODE_UNSET]
          le: []  # histogram bucket boundary

      - name: traces_span_metrics_calls_total
        type: counter
        category: golden_signal
        labels:
          service_name: [checkout]
          span_kind: [SPAN_KIND_CLIENT, SPAN_KIND_INTERNAL, SPAN_KIND_SERVER]
          span_name:
            - POST
            - "oteldemo.CartService/EmptyCart"
            - "oteldemo.CartService/GetCart"
            - "oteldemo.CheckoutService/PlaceOrder"
            - "oteldemo.CurrencyService/Convert"
            - "oteldemo.PaymentService/Charge"
            - "oteldemo.ProductCatalogService/GetProduct"
            - prepareOrderItemsAndShippingQuoteFromCart
          status_code: [STATUS_CODE_ERROR, STATUS_CODE_UNSET]

      - name: ALERTS
        type: gauge
        category: meta
        labels:
          service_name: [checkout]
          alertname: [PaymentServiceUnreachable]
          alertstate: [firing, pending]
          rpc_method: ["oteldemo.PaymentService/Charge"]
          severity: [critical]

      - name: ALERTS_FOR_STATE
        type: gauge
        category: meta
        labels:
          service_name: [checkout]
          alertname: [PaymentServiceUnreachable]
          rpc_method: ["oteldemo.PaymentService/Charge"]
          severity: [critical]

      - name: go_config_gogc_percent
        type: gauge
        category: runtime
        labels:
          service_name: [checkout]

      - name: go_goroutine
        type: gauge
        category: runtime
        labels:
          service_name: [checkout]

      - name: go_memory_allocated_bytes_total
        type: counter
        category: runtime
        labels:
          service_name: [checkout]

      - name: go_memory_allocations_total
        type: counter
        category: runtime
        labels:
          service_name: [checkout]

      - name: go_memory_gc_goal_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [checkout]

      - name: go_memory_limit_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [checkout]

      - name: go_memory_used_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [checkout]
          go_memory_type: [other, stack]

      - name: go_processor_limit
        type: gauge
        category: runtime
        labels:
          service_name: [checkout]

      - name: target_info
        type: gauge
        category: meta
        labels:
          service_name: [checkout]
          telemetry_sdk_language: [go]
          telemetry_sdk_name: [opentelemetry]
          process_runtime_name: [go]
          process_runtime_version: ["go1.25.9"]

    logs:
      source: opensearch
      index_pattern: "otel-logs-*"
      service_name_field: "resource.service.name.keyword"
      service_name_value: "checkout"
      timestamp_field: "@timestamp"
      severity_field: "severity.text"
      severity_values:
        error: [ERROR, error, Error]
        warn: [WARN, warn, Warning]
        info: [INFO, info, Information]
      body_field: body
      error_filter:
        field: severity.text
        values: [ERROR, error, Error, WARN, warn, Warning]
      trace_id_field: traceId
      span_id_field: spanId
      key_attribute_fields:
        - attributes.user_id
        - attributes.user_currency

    traces:
      jaeger_service: checkout
      server_operations:
        - oteldemo.CheckoutService/PlaceOrder
        - prepareOrderItemsAndShippingQuoteFromCart
      client_operations:
        - oteldemo.CartService/EmptyCart
        - oteldemo.CartService/GetCart
        - oteldemo.CurrencyService/Convert
        - oteldemo.PaymentService/Charge
        - oteldemo.ProductCatalogService/GetProduct
        - POST /get-quote
        - POST /ship-order
      error_tag: error
      lookback_default_minutes: 30

  cart:
    protocol: grpc
    port: 7070
    language: dotnet
    depends_on:
      - valkey-cart
      - flagd
    metrics:
      # cart exposes modern OTel HTTP semantics despite being a gRPC service (dotnet/kestrel)
      - name: http_server_request_duration_seconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [cart]
          http_request_method: [POST]
          http_response_status_code: ["200"]
          http_route:
            - /oteldemo.CartService/AddItem
            - /oteldemo.CartService/EmptyCart
            - /oteldemo.CartService/GetCart
          network_protocol_version: ["2"]
          url_scheme: [http]
          le: []  # histogram bucket boundary

      - name: http_server_active_requests
        type: gauge
        category: golden_signal
        labels:
          service_name: [cart]
          http_request_method: [POST]
          url_scheme: [http]

      # app_cart_* metrics indirectly reflect valkey round-trip latency
      - name: app_cart_add_item_latency_seconds
        type: histogram
        category: custom
        labels:
          service_name: [cart]
          le: []  # histogram bucket boundary

      - name: app_cart_get_cart_latency_seconds
        type: histogram
        category: custom
        labels:
          service_name: [cart]
          le: []  # histogram bucket boundary

      - name: feature_flag_evaluation_active
        type: gauge
        category: custom
        labels:
          service_name: [cart]
          feature_flag_key: [cartFailure, failedReadinessProbe]
          feature_flag_provider_name: [flagd Provider]

      - name: feature_flag_evaluation_requests_total
        type: counter
        category: custom
        labels:
          service_name: [cart]
          feature_flag_key: [cartFailure, failedReadinessProbe]
          feature_flag_provider_name: [flagd Provider]

      - name: feature_flag_evaluation_success_total
        type: counter
        category: custom
        labels:
          service_name: [cart]
          feature_flag_key: [cartFailure, failedReadinessProbe]
          feature_flag_provider_name: [flagd Provider]
          feature_flag_result_reason: [STATIC]

      - name: feature_flag_evaluation_error_total
        type: counter
        category: custom
        labels:
          service_name: [cart]
          feature_flag_key: [failedReadinessProbe]
          feature_flag_provider_name: [flagd Provider]
          exception: []  # high-cardinality error message

      - name: traces_span_metrics_duration_milliseconds
        type: histogram
        category: golden_signal
        labels:
          service_name: [cart]
          span_kind: [SPAN_KIND_CLIENT, SPAN_KIND_SERVER]
          span_name:
            - POST
            - POST /oteldemo.CartService/AddItem
            - POST /oteldemo.CartService/EmptyCart
            - POST /oteldemo.CartService/GetCart
            - "flagd.evaluation.v2.Service/EventStream"
            - "flagd.evaluation.v2.Service/ResolveBoolean"
            - "valkey-cart:6379"
          status_code: [STATUS_CODE_ERROR, STATUS_CODE_UNSET]
          le: []  # histogram bucket boundary

      - name: traces_span_metrics_calls_total
        type: counter
        category: golden_signal
        labels:
          service_name: [cart]
          span_kind: [SPAN_KIND_CLIENT, SPAN_KIND_SERVER]
          span_name:
            - POST
            - POST /oteldemo.CartService/AddItem
            - POST /oteldemo.CartService/EmptyCart
            - POST /oteldemo.CartService/GetCart
            - "flagd.evaluation.v2.Service/EventStream"
            - "flagd.evaluation.v2.Service/ResolveBoolean"
            - "valkey-cart:6379"
          status_code: [STATUS_CODE_ERROR, STATUS_CODE_UNSET]

      - name: aspnetcore_memory_pool_allocated_bytes_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]
          aspnetcore_memory_pool_owner: [kestrel]

      - name: aspnetcore_memory_pool_evicted_bytes_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]
          aspnetcore_memory_pool_owner: [kestrel]

      - name: aspnetcore_memory_pool_pooled_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [cart]
          aspnetcore_memory_pool_owner: [kestrel]

      - name: aspnetcore_memory_pool_rented_bytes_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]
          aspnetcore_memory_pool_owner: [kestrel]

      - name: aspnetcore_routing_match_attempts_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]
          aspnetcore_routing_is_fallback: ["false"]
          aspnetcore_routing_match_status: [success]
          http_route:
            - /oteldemo.CartService/AddItem
            - /oteldemo.CartService/EmptyCart
            - /oteldemo.CartService/GetCart

      - name: dotnet_assembly
        type: gauge
        category: runtime
        labels:
          service_name: [cart]

      - name: dotnet_exceptions_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]
          error_type:
            - DirectoryNotFoundException
            - FeatureProviderException
            - HttpRequestException
            - IOException
            - ObjectDisposedException
            - RpcException
            - SocketException
            - TaskCanceledException

      - name: dotnet_gc_collections_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]
          gc_heap_generation: [gen0, gen1, gen2]

      - name: dotnet_gc_heap_allocated_bytes_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]

      - name: dotnet_gc_last_collection_heap_fragmentation_size_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [cart]
          gc_heap_generation: [gen0, gen1, gen2, loh, poh]

      - name: dotnet_gc_last_collection_heap_size_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [cart]
          gc_heap_generation: [gen0, gen1, gen2, loh, poh]

      - name: dotnet_gc_last_collection_memory_committed_size_bytes
        type: gauge
        category: runtime
        labels:
          service_name: [cart]

      - name: dotnet_gc_pause_time_seconds_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]

      - name: dotnet_jit_compilation_time_seconds_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]

      - name: dotnet_jit_compiled_il_size_bytes_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]

      - name: dotnet_jit_compiled_methods_total
        type: counter
        category: runtime
        labels:
          service_name: [cart]

      - name: dotnet_monitor_lock_contentions_total
