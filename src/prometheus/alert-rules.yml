groups:
  - name: observability_agent_alerts
    interval: 30s
    rules:

      # Case (EASY): Payment service unreachable - checkout cannot charge customers
      # Trigger: set paymentUnreachable flag to "on" in src/flagd/demo.flagd.json
      - alert: OperationalAnomalyDetected
        expr: |
          (
            sum(rate(rpc_client_call_duration_seconds_count{service_name="checkout", rpc_response_status_code!="OK"}[5m])) by (service_name, rpc_method)
            /
            sum(rate(rpc_client_call_duration_seconds_count{service_name="checkout"}[5m])) by (service_name, rpc_method)
          ) > 0.5
        for: 1m
        labels:
          severity: critical
          scenario: case_easy
        annotations:
          summary: "Alert"
          description: |
            Review system logs, traces, and metrics.

      # Case 4 (MEDIUM): Latency degradation on a key recommendation service method
      # Trigger: set recommendationLatencyDegradation flag to "on" in src/flagd/demo.flagd.json     
      # Root cause is a cache policy change that causes more calls to the database, which is slower than the cache. 
      # The alert is on the service latency degradation, not the database itself, because the database latency is still within acceptable thresholds and would not trigger a database-specific alert.
      # The root cause is one hop deeper (cache policy) not the service itself                                                                         
                                                                                                                                                                              
      - alert: ServiceLatencyDegradation
        expr: |
          (
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog",
              rpc_response_status_code!="OK"
            }[2m]))
            /
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog"
            }[2m]))
          ) > 0.01
        for: 0m                                                                                                                                                                                                                             
        labels:                                   
          severity: warning                                                                                                                                                                                            
          scenario: case_medium    

                                                                                  
      # Case (HARD): Cart service errors blocking user purchases
      # Trigger: set cartFailure flag to "on" in src/flagd/demo.flagd.json
      # Root cause is a silent data corruption issue that causes certain calls to the cart service to fail. 
      # The alert is on the error rate increase, not the data corruption itself, because the corruption does
      # not have specific metrics or logs associated with it and would require deep investigation to identify.
      - alert: UserJourneyAnomalyDetected
        expr: |
          (
            sum(rate(traces_span_metrics_calls_total{service_name="cart", status_code="STATUS_CODE_ERROR"}[2m]))
            /
            sum(rate(traces_span_metrics_calls_total{service_name="cart"}[2m]))
          ) > 0.02
        for: 0m                                                 
        labels:
          severity: warning                                                                                                                                                                                            
          scenario: case_hard
        annotations:                                                                                                                                                                                                   
          summary: "Anomalous system behavior detected"         
          # description: |                          
          #   An unusual pattern has been detected in system behavior. Investigate using traces, metrics, and logs.                                        

      # # Case 1 (HARD): Anomalous zero-value shipping costs on placed orders
