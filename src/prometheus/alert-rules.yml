groups:
  - name: observability_agent_alerts
    interval: 30s
    rules:

      # Case (EASY): Payment service unreachable - checkout cannot charge customers
      # Trigger: set paymentUnreachable flag to "on" in src/flagd/demo.flagd.json
      # Root cause : a network connectivity issue between the checkout service and the payment service, causing all payment attempts to fail.
      - alert: OperationalAnomalyDetected
        expr: |
          (
            sum(rate(rpc_client_call_duration_seconds_count{service_name="checkout", rpc_response_status_code!="OK"}[5m])) by (service_name, rpc_method)
            /
            sum(rate(rpc_client_call_duration_seconds_count{service_name="checkout"}[5m])) by (service_name, rpc_method)
          ) > 0.5
        for: 1m
        labels:
          severity: critical
          scenario: case_easy
        annotations:
          summary: "Alert"
          description: |
            Review system logs, traces, and metrics.

      # Case 4 (MEDIUM): Latency degradation on a key recommendation service method
      # Trigger: set recommendationLatencyDegradation flag to "on" in src/flagd/demo.flagd.json
      # Root cause : A specific product lookup in the product catalog is failing,
      # caused by the productCatalogFailure flag injecting errors for one product ID.  
              
      - alert: ServiceLatencyDegradation
        expr: |
          (
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog",
              rpc_response_status_code!="OK"
            }[2m]))
            /
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog"
            }[2m]))
          ) > 0.01
        for: 0m
        labels:
          severity: warning
          scenario: case_medium

  
      # Case (HARD): Cart service errors blocking user purchases
      # Trigger: set cartFailure flag to "on" in src/flagd/demo.flagd.json
      # Root cause: Cart storage is unreachable, causing checkout to fail when trying to clear the cart after purchase. 
      - alert: UserJourneyAnomalyDetected
        expr: |
          (
            sum(rate(rpc_client_call_duration_seconds_count{
              service_name="checkout",
              rpc_response_status_code="FAILED_PRECONDITION"
            }[2m]))
            /
            sum(rate(rpc_client_call_duration_seconds_count{
              service_name="checkout"
            }[2m]))
          ) > 0.1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Anomalous system behavior detected"
          description: |
            An unusual pattern has been detected in system behavior. Investigate using traces, metrics, and logs.
                          
                       
      # Case (VERY HARD): DB query latency spike caused by upstream cache exhaustion 
      # Trigger: set recommendationCacheFailure flag to "on" in src/flagd/demo.flagd.json
      # Root cause : Recommendation service cache is disabled, causing it to hammer
      # the product catalog database with queries, which overwhelms the already-slow astronomy DB.
      - alert: InfrastructureResourceAnomaly            
        expr: |            
          histogram_quantile(0.95,                      
            sum by(le)(    
              rate(db_client_operation_duration_seconds_bucket{service_name="product-catalog"}[2m])                   
            )              
          ) > 4.0          
        for: 0m                    
        labels:            
          severity: warning
          scenario: case_very_hard                      
        annotations:               
          summary: "Infrastructure resource anomaly detected"
          description: |   
            An infrastructure-level anomaly has been detected. Investigate using available observability data.
                         
