groups:
  - name: observability_agent_alerts
    interval: 30s
    rules:

      # Case (EASY): Checkout RPC error rate > 50% — critical path broken
      #
      # Scenario A — Payment service unreachable:
      #   Trigger flag : paymentUnreachable = on  → fires immediately [verified]  
      #   Impact  : 100% of payment RPCs from checkout are failing. Customers cannot complete
      #             purchases. Revenue impact is immediate and total.
      #   Root cause: Network connectivity failure between checkout and payment service.
      #             Checkout is unable to establish a connection to the payment service endpoint.
      #             Every payment attempt returns a connectivity error (e.g. connection refused /
      #             no route to host), driving the checkout RPC error rate above 50%.
      #
      # Scenario B — Cart service EmptyCart failures propagating to checkout:
      #   Trigger flag : cartFailure        = on  → fires after ~2-3+ minutes [verified]
      #   Impact  : Checkout is accumulating non-OK RPC responses at a rate sufficient to push
      #             its overall error rate above 30%. Customer purchases are failing at checkout.
      #   Root cause: The cart service is returning FAILED_PRECONDITION on EmptyCart calls.
      #             Checkout depends on EmptyCart to finalize each order; when cart rejects those
      #             calls, checkout records them as RPC errors. Under sustained load the error
      #             rate crosses the 30% threshold.
      - alert: Easy Alert
        expr: |
          (
            sum(rate(rpc_client_call_duration_seconds_count{rpc_method!~".*art.*", service_name="checkout", rpc_response_status_code!="OK"}[5m])) by (service_name, rpc_method)
            /
            sum(rate(rpc_client_call_duration_seconds_count{rpc_method!~".*art.*",service_name="checkout"}[5m])) by (service_name, rpc_method)
          ) > 0.3
        for: 0m
        labels:
          severity: critical
          scenario: case_easy
        annotations:
          summary: "Alert"
          description: |
            Review system logs, traces, and metrics.




      # Case (MEDIUM): Checkout FAILED_PRECONDITION error rate > 10% — partial order failures
      #   Trigger flag : cartFailure = on  → fires after ~1-2+ minute [verified]
      #   Impact  : Checkout is successfully charging customers but failing to complete order
      #           finalization. The cart is not being cleared after payment, leaving users in
      #           an inconsistent state (charged but order not confirmed). This is a silent
      #           data integrity issue — revenue is collected but fulfillment is broken.
      #   Root cause: The cart service is failing all EmptyCart operations with
      #             FAILED_PRECONDITION, indicating it cannot reach or write to its backing
      #             store (Valkey/Redis). Checkout calls EmptyCart after a successful payment;
      #             when cart rejects the call, checkout returns FAILED_PRECONDITION to the
      #             caller. As order volume accumulates, this specific error rate on checkout
      #             exceeds 10%.
      - alert: Medium Alert
        expr: |
          (
            sum(rate(rpc_client_call_duration_seconds_count{
              service_name="checkout",
              rpc_response_status_code="FAILED_PRECONDITION"
            }[2m]))
            /
            sum(rate(rpc_client_call_duration_seconds_count{
              service_name="checkout"
            }[2m]))
          ) > 0.1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Anomalous system behavior detected"
          description: |
            An unusual pattern has been detected in system behavior. Investigate using traces, metrics, and logs.

      # Case (HARD): Product catalog RPC error rate > 1%
      #
      # Scenario A — Recommendation service flooding product-catalog:
      #   Trigger flag : recommendationCacheFailure = on  → fires immediately [verified]
      #   Impact  : Product-catalog is receiving an abnormally high volume of GetProduct RPCs
      #             from the recommendation service, causing its error rate to rise above 1%.
      #             Product pages and recommendations may return partial or incorrect results.
      #   Root cause: The recommendation service has a cache population bug — under concurrent
      #             load the internal product ID list grows unboundedly, causing the service to
      #             issue a rapidly increasing number of GetProduct calls to product-catalog.
      #             Product-catalog becomes overwhelmed and begins returning errors.

      - alert: Hard Alert
        expr: |
          (
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog",
              rpc_response_status_code!="OK"
            }[2m]))
            /
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog"
            }[2m]))
          ) > 0.01
        for: 0m
        labels:
          severity: warning