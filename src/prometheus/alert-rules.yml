groups:
  - name: observability_agent_alerts
    interval: 30s
    rules:

      # Case (EASY): Payment service unreachable - checkout cannot charge customers
      # Trigger flag : paymentUnreachable = on  → fires immediately [verified]  
      #                cartFailure        = on  → fires after ~1.5+ minutes [verified]  
      # Root cause (paymentUnreachable): Checkout replaces the real payment service address with
      #   'badAddress:50051', causing 100% of payment RPCs to fail immediately.
      # Root cause (cartFailure): Cart's EmptyCart failures return FAILED_PRECONDITION back to
      #   checkout. FAILED_PRECONDITION is a non-OK RPC status, so it accumulates in the error
      #   rate numerator. Once enough checkouts have attempted (and failed) to clear the cart,
      #   the overall checkout error rate crosses 50%.
      - alert: OperationalAnomalyDetected
        expr: |
          (
            sum(rate(rpc_client_call_duration_seconds_count{service_name="checkout", rpc_response_status_code!="OK"}[5m])) by (service_name, rpc_method)
            /
            sum(rate(rpc_client_call_duration_seconds_count{service_name="checkout"}[5m])) by (service_name, rpc_method)
          ) > 0.5
        for: 0m
        labels:
          severity: critical
          scenario: case_easy
        annotations:
          summary: "Alert"
          description: |
            Review system logs, traces, and metrics.

      # Case (MEDIUM): Product catalog returning errors
      # Trigger flag : recommendationCacheFailure = on  → fires immediately [verified]
      #                productCatalogFailure      = on  → fires after ~1 minute [verified]
      # Root cause (recommendationCacheFailure): Recommendation service activates a buggy cache that
      #   appends 25% extra duplicate IDs on each population. Under concurrent load the global list
      #   grows unboundedly, flooding product-catalog with GetProduct RPCs until its error rate
      #   crosses 1%.
      # Root cause (productCatalogFailure): GetProduct always returns Internal error for product ID
      #   OLJCESPC7Z. The load generator must request that product enough times to push the
      #   product-catalog RPC error rate above 1%.
      - alert: ServiceLatencyDegradation
        expr: |
          (
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog",
              rpc_response_status_code!="OK"
            }[2m]))
            /
            sum(rate(rpc_server_call_duration_seconds_count{
              service_name="product-catalog"
            }[2m]))
          ) > 0.01
        for: 0m
        labels:
          severity: warning
          scenario: case_medium


      # Case (HARD): Cart service errors blocking user purchases
      # Trigger flag : cartFailure = on  → fires after ~1+ minute [verified]
      # Root cause   : Cart service routes EmptyCart to a bad store instead of Redis. Checkout
      #                charges the card successfully but then fails to clear the cart, returning
      #                FAILED_PRECONDITION. Fires when that error rate on checkout exceeds 10%.
      - alert: UserJourneyAnomalyDetected
        expr: |
          (
            sum(rate(rpc_client_call_duration_seconds_count{
              service_name="checkout",
              rpc_response_status_code="FAILED_PRECONDITION"
            }[2m]))
            /
            sum(rate(rpc_client_call_duration_seconds_count{
              service_name="checkout"
            }[2m]))
          ) > 0.1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Anomalous system behavior detected"
          description: |
            An unusual pattern has been detected in system behavior. Investigate using traces, metrics, and logs.


      # Case (VERY HARD): DB query latency spike caused by upstream cache exhaustion
      # Trigger flag : __________
      # Root cause   : ___________________________________________________________________________
      - alert: InfrastructureResourceAnomaly
        expr: |
          (
            sum(rate(db_client_operation_duration_seconds_sum{service_name="product-catalog"}[2m]))
            /
            sum(rate(db_client_operation_duration_seconds_count{service_name="product-catalog"}[2m]))
          ) > 0.1
        for: 0m
        labels:
          severity: warning
          scenario: case_very_hard
        annotations:
          summary: "Infrastructure resource anomaly detected"
          description: |
            An infrastructure-level anomaly has been detected. Investigate using available observability data.

      # High database operation latency on product-catalog
      # Indicates slow PostgreSQL queries — visible in Jaeger traces and DB metrics
      # - alert: HighDatabaseLatency
      #   expr: |
      #     histogram_quantile(0.95,
      #       sum(rate(db_client_operation_duration_seconds_bucket[5m])) by (le, service_name)
      #     ) > 1.0
      #   for: 2m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "High database latency on {{ $labels.service_name }}"
      #     description: "P95 DB latency is {{ $value | humanizeDuration }} on {{ $labels.service_name }}"
