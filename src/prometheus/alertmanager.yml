route:
  receiver: 'webhook-receiver'
  group_by: ['alertname', 'service_name', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 5m

receivers:
  - name: 'webhook-receiver'
    webhook_configs:
      - url: 'http://alert-webhook-server:5000/webhook'
        send_resolved: true
