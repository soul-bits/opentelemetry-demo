route:
  receiver: 'rca-agent'
  group_by: ['alertname', 'service_name', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 5m

receivers:
  - name: 'rca-agent'
    webhook_configs:
      - url: 'http://host.docker.internal:5002/webhook'
        send_resolved: true
